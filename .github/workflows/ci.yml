name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]   # 3.12 = Pyodide floor guard; 3.14 = dev
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false   # core/tests must not need the upstream submodule

      - name: Install uv
        # Pinned to a full commit SHA (supply-chain hardening); comment tracks the tag.
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync (all extras + dev)
        run: uv sync --locked --all-extras --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check .

      - name: Tests
        run: uv run pytest
