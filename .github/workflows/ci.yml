name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]   # 3.12 = Pyodide floor guard; 3.14 = dev
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false   # core/tests must not need the upstream submodule

      - name: Install uv
        uses: astral-sh/setup-uv@v8   # bumped from v6 to current major (v8)
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync (all extras + dev)
        run: uv sync --locked --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check .

      - name: Tests
        run: uv run pytest
